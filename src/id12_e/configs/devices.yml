# ============================================================================
# 12iddMCS2 (12-ID-D general soft IOC) — deployed prefix "12iddMCS2:".
#
# PROVISIONAL / DISABLED: as of this writing the IOC's st.cmd.Linux boots ONLY
# synApps soft services (autosave, caputRecorder, sscan/saveData, userCalcs,
# lua, sseq, interp, busy, alive, devIocStats, STD/misc.db) plus motor
# allstop/alldone logic. ALL hardware motor loading is commented out in
# iocBoot/ioc12iddMCS2/iocsh/motors.iocsh:
#   #dbLoadTemplate("substitutions/motor.substitutions", ...)   # OMS MAXv m1-m8
#   #dbLoadTemplate("substitutions/softMotor.substitutions", ...) # SM1-SM10
#   #iocshLoad("$(MOTOR)/iocsh/motorSim.iocsh", ...)             # sim m1-m16
# No scaler and no MCA db are loaded anywhere. So the motor PVs below DO NOT
# EXIST even when the IOC is running. Uncomment this entry only after the OMS
# MAXv table is actually loaded in motors.iocsh (and confirm the axis map).
#
# Axis names come from the DESC fields in substitutions/motor.substitutions
# (optical-table stages): m1=M0X, m2=M0Y, m3=M1Y, m4=M2X, m5=M2Y, m6=M2Z;
# m7/m8 have generic DESC ("motor N").
# ----------------------------------------------------------------------------
# apstools.devices.motor_factory.mb_creator:
# - name: mcs2_table            # 12iddMCS2 — OMS MAXv table stages (loading commented in motors.iocsh)
#   labels: [ "motors" ]
#   prefix: "12iddMCS2:"
#   class_name: Mcs2TableStages
#   motors: { m0x: m1, m0y: m2, m1y: m3, m2x: m4, m2y: m5, m2z: m6, m7: m7, m8: m8 }

apstools.devices.area_detector_factory.ad_creator:
  
- name: pilatus2m
  prefix: "S12-PILATUS1:"
  # IOC host: green
  labels: [ "area_detector", "detectors", "SAXS" ]
  plugins:
  - cam:
      class: id12_common.devices.area_detector.ID12_PilatusCam_V34
  - image
  - pva

- name: pilatus900k
  prefix: "12idcPIL:"
  # IOC host:
  labels: [ "area_detector", "detectors", "WAXS" ]
  plugins:
  - cam:
      class: id12_common.devices.area_detector.ID12_PilatusCam_V34
  - image
  - pva
# TODO: incomplete 'xsp3' (Xspress3?) entry — commented out so this ad_creator list loads.
#       A bare `- name: xsp3` (no prefix/plugins) makes ad_creator raise at startup. Complete or remove.
# - name: xsp3

- name: bfs1
  prefix: "12idBFS1:"
  # 12-ID-C FLIR Blackfly-S BFS-PGE-16S2C (ADSpinnaker)
  labels: [ "area_detector", "detectors" ]
  plugins:
  - cam: { class: id12_common.devices.area_detector.ID12_SpinnakerCam_V34 }
  - image: { class: id12_common.devices.area_detector.ID12_ImagePlugin }
  - hdf1:
      class: id12_common.devices.area_detector.ID12_EpicsFileNameHDF5Plugin
      # TODO: set to the real 12-ID-B DM directory (as Bluesky sees it / as the IOC sees it)
      read_path_template: /PLACEHOLDER/bluesky/
      write_path_template: /PLACEHOLDER/ioc/
      kind: normal
- name: bfs2
  prefix: "12idBFS2:"
  # 12-ID-C FLIR Blackfly-S BFS-PGE-16S2C (ADSpinnaker)
  labels: [ "area_detector", "detectors" ]
  plugins:
  - cam: { class: id12_common.devices.area_detector.ID12_SpinnakerCam_V34 }
  - image: { class: id12_common.devices.area_detector.ID12_ImagePlugin }
  - hdf1:
      class: id12_common.devices.area_detector.ID12_EpicsFileNameHDF5Plugin
      # TODO: set to the real 12-ID-B DM directory (as Bluesky sees it / as the IOC sees it)
      read_path_template: /PLACEHOLDER/bluesky/
      write_path_template: /PLACEHOLDER/ioc/
      kind: normal


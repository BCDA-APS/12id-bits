apstools.devices.srs570_preamplifier.SRS570_PreAmplifier:
- { name: preamp_a1, prefix: "12idb:A1", labels: [ "preamp" ] }   # 12idb SR570 (serial1)
- { name: preamp_a2, prefix: "12idb:A2", labels: [ "preamp" ] }   # serial2
- { name: preamp_a3, prefix: "12idb:A3", labels: [ "preamp" ] }   # serial3
- { name: preamp_a4, prefix: "12idb:A4", labels: [ "preamp" ] }   # serial4
- { name: preamp_a5, prefix: "12idb:A5", labels: [ "preamp" ] }   # serial5
- { name: preamp_a6, prefix: "12idb:A6", labels: [ "preamp" ] }   # serial6
- { name: preamp_a7, prefix: "12idb:A7", labels: [ "preamp" ] }   # serial11
- { name: fe_preamp_a1, prefix: "12ida1:A1", labels: [ "preamp" ] }  # 12ida1 front-end SR570 (serial11)
- { name: fe_preamp_a2, prefix: "12ida1:A2", labels: [ "preamp" ] }  # serial12
- { name: fe_preamp_a3, prefix: "12ida1:A3", labels: [ "preamp" ] }  # serial13
- { name: fe_preamp_a4, prefix: "12ida1:A4", labels: [ "preamp" ] }  # serial14

# --- 12idb2 (vxWorks VME crate): 2 OMS MAXv cards + Joerger VSC8/16 scaler ---
id12_b.devices.motors.Idb2Stages:
- name: idb2_stages              # 12idb2 — OMS MAXv, 8 active axes (card 0, m1-m8)
  prefix: "12idb2:"
  labels: [ "motors" ]

ophyd.scaler.ScalerCH:
- name: scaler1                  # 12idb — counting scaler
  prefix: "12idb:scaler1"
  labels: [ "scalers"]

apstools.synApps.Optics2Slit2D_HV:
- name: slit3                    # 12idb — 2-slit (H on m19/m20, V on m17/m18)
  prefix: "12idb:Slit1"
  labels: [ "slits" ]
- name: slit1                    # 12ida1 — mono-beam slit (H=MBSH m8/m7, V=MBSV m5/m6)
  prefix: "12ida1:MBS"
  labels: [ "slits" ]
- name: slit2                    # 12ida1 — beam-defining slit (H=BDSH m32/m31, V=BDSV m29/m30)
  prefix: "12ida1:BDS"
  labels: [ "slits" ]

id12_b.devices.vacuum.TPG261:
- name: vac_g1                   # 12idb — TPG261 vacuum gauge G1
  prefix: "12idb:G1:"
  labels: [ "vacuum" ]

id12_common.devices.shutters.UniblitzShutter:
- name: fshutter                 # 12idb — Uniblitz VCMD-D1 fast shutter
  prefix: "12idb:uniblitz:"
  labels: [ "shutters" ]

# ============================================================================
# 12-ID-A front end (12ida1 IOC) — optics that define the beam delivered to B.
# ============================================================================

id12_b.devices.dcm.DoubleCrystalMonochromator:
- name: dcm                      # 12ida1 — double-crystal mono (energy in keV)
  prefix: "12ida1:"
  labels: [ "monochromator", "energy" ]

id12_b.devices.vacuum.IonGauge:
- { name: ig1, prefix: "12ida1:IG1", labels: [ "vacuum" ] }   # GP307 (serial7)
- { name: ig2, prefix: "12ida1:IG2", labels: [ "vacuum" ] }   # serial8
- { name: ig3, prefix: "12ida1:IG3", labels: [ "vacuum" ] }   # serial9
- { name: ig4, prefix: "12ida1:IG4", labels: [ "vacuum" ] }   # serial10

id12_b.devices.vacuum.IonPump:
- { name: ip1, prefix: "12ida1:IP1", labels: [ "vacuum" ] }     # PI-MPC (serial1)
- { name: ip2, prefix: "12ida1:IP2", labels: [ "vacuum" ] }
- { name: ip3, prefix: "12ida1:IP3", labels: [ "vacuum" ] }
- { name: ip4, prefix: "12ida1:IP4", labels: [ "vacuum" ] }
- { name: ip5, prefix: "12ida1:IP5", labels: [ "vacuum" ] }
- { name: ip6, prefix: "12ida1:IP6", labels: [ "vacuum" ] }
- { name: ip7, prefix: "12ida1:IP7", labels: [ "vacuum" ] }
- { name: ip8, prefix: "12ida1:IP8", labels: [ "vacuum" ] }
- { name: ip9, prefix: "12ida1:IP9", labels: [ "vacuum" ] }
- { name: ip10, prefix: "12ida1:IP10", labels: [ "vacuum" ] }
- { name: ip11, prefix: "12ida1:IP11", labels: [ "vacuum" ] }
- { name: ip12, prefix: "12ida1:IP12", labels: [ "vacuum" ] }

id12_b.devices.vacuum.CryoLevelMeter:
- { name: cryo1, prefix: "12ida1:s1", labels: [ "cryo" ] }    # Oxford ILM202 (serial15)
- { name: cryo2, prefix: "12ida1:s2", labels: [ "cryo" ] }    # serial16


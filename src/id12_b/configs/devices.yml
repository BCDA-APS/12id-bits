# Guarneri-style device YAML configuration

apsbits.utils.sim_creator.predefined_device:
- { creator: ophyd.sim.motor, name: sim_motor }
- { creator: ophyd.sim.noisy_det, name: sim_det }

# ============================================================================
# 12-ID-B hardware (generated from the IOC sources under ../../../../epics).
# NOTE: this file is loaded on EVERY startup; off the APS subnet these will
# attempt to connect. Move to devices_aps_only.yml if that becomes a problem.
# ============================================================================

apstools.devices.ApsMachineParametersDevice:
- name: aps
  labels:
  - baseline

id12_common.devices.delays.DG645Delay:
- name: dg645
  prefix: "12idb:DG1:"
  labels: [ "delaygen"]

apstools.devices.motor_factory.mb_creator:
- name: hxp_b                      # 12idbHXP — PI C-887 hexapod (GCS2)
  labels: [ "hexapod" ]
  prefix: "12idbHXP:"
  class_name: HexapodPiC887
  motors: { hxp_x: m1, hxp_y: m2, hxp_z: m3, hxp_u: m4, hxp_v: m5, hxp_w: m6 }

## SoftIOC for encoder.
## 12idbLilac:e1
# - name: lilac_acs                  # 12idbLilac — ACS SPiiPlus, 32 axes
#   labels: [ "motors" ]
#   prefix: "12idbLilac:"
#   class_name: LilacAcsStages
#   # KB pseudo-motors (pm1-pm4 via m17-m20) and filter blades deferred.
#   motors: { m1: m1, m2: m2, m3: m3, m4: m4, m5: m5, m6: m6, m7: m7, m8: m8, m9: m9, m10: m10, m11: m11, m12: m12, m13: m13, m14: m14, m15: m15, m16: m16, m17: m17, m18: m18, m19: m19, m20: m20, m21: m21, m22: m22, m23: m23, m24: m24, m25: m25, m26: m26, m27: m27, m28: m28, m29: m29, m30: m30, m31: m31, m32: m32 }

- name: b_motors                  # 12idb — OMS MAXv, 48 axes (DESCs mostly generic "motor N")
  labels: [ "motors" ]
  prefix: "12idb:"
  class_name: B12idbStages
  # m17-m20 also drive slit1 (below); m24/m47 also drive the cf1 coarse/fine motor.
  motors: { m1: m1, m2: m2, m3: m3, m4: m4, m5: m5, m6: m6, m7: m7, m8: m8, m9: m9, m10: m10, m11: m11, m12: m12, m13: m13, m14: m14, m15: m15, m16: m16, m17: m17, m18: m18, m19: m19, m20: m20, m21: m21, m22: m22, m23: m23, m24: m24, m25: m25, m26: m26, m27: m27, m28: m28, m29: m29, m30: m30, m31: m31, m32: m32, m33: m33, m34: m34, m35: m35, m36: m36, m37: m37, m38: m38, m39: m39, m40: m40, m41: m41, m42: m42, m43: m43, m44: m44, m45: m45, m46: m46, m47: m47, m48: m48 }



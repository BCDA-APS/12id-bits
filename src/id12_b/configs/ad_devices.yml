apstools.devices.area_detector_factory.ad_creator:

- name: pilatus2m
  prefix: "S12-PILATUS1:"
  # IOC host: green
  labels: [ "area_detector", "detectors", "SAXS" ]
  plugins:
  - cam:
      class: id12_common.devices.area_detector.ID12_PilatusCam_V34
  - image
  - pva

- name: pilatus900k
  prefix: "12idcPIL:"
  # IOC host:
  labels: [ "area_detector", "detectors", "WAXS" ]
  plugins:
  - cam:
      class: id12_common.devices.area_detector.ID12_PilatusCam_V34
  - image
  - pva

- name: eiger
  prefix: "12idbEGR:"
  # 12-ID-B Dectris Eiger2 9M
  labels: [ "area_detector", "detectors" ]
  plugins:
  - badpix1 # apstools 1.7.3+, no extra customization needed
  - cam: { class: id12_common.devices.area_detector.ID12_EigerCam_V34 }
  - codec1: { class: id12_common.devices.area_detector.ID12_CodecPlugin }
  - image: { class: id12_common.devices.area_detector.ID12_ImagePlugin }
  - hdf1:
      class: id12_common.devices.area_detector.ID12_EpicsFileNameHDF5Plugin
      # TODO: set to the real 12-ID-B DM directory (as Bluesky sees it / as the IOC sees it)
      read_path_template: /PLACEHOLDER/bluesky/
      write_path_template: /PLACEHOLDER/ioc/
      kind: normal
  - overlay1: { class: id12_common.devices.area_detector.ID12_OverlayPlugin }
  - process1: { class: id12_common.devices.area_detector.ID12_ProcessPlugin }
  - pva: { class: id12_common.devices.area_detector.ID12_PvaPlugin }
  - roi1: { class: id12_common.devices.area_detector.ID12_ROIPlugin }
  - roi2: { class: id12_common.devices.area_detector.ID12_ROIPlugin }
  - roi3: { class: id12_common.devices.area_detector.ID12_ROIPlugin }
  - roi4: { class: id12_common.devices.area_detector.ID12_ROIPlugin }
  - stats1: { class: id12_common.devices.area_detector.ID12_StatsPlugin, kind: hinted }
  - stats2: { class: id12_common.devices.area_detector.ID12_StatsPlugin }
  - stats3: { class: id12_common.devices.area_detector.ID12_StatsPlugin }
  - stats4: { class: id12_common.devices.area_detector.ID12_StatsPlugin }
  - stats5: { class: id12_common.devices.area_detector.ID12_StatsPlugin }
  - transform1: { class: id12_common.devices.area_detector.ID12_TransformPlugin }

